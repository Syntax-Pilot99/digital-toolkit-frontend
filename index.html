<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Digital Toolkit</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0b0f19;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 16px;
            padding: 30px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .badge {
            background: #2563eb;
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        h1 span {
            color: #3b82f6;
        }
        p.subtitle {
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .price-box {
            background: #1f2937;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        .bundle-title {
            font-size: 16px;
            color: #9ca3af;
            margin-bottom: 5px;
        }
        .price {
            font-size: 36px;
            font-weight: bold;
            color: #ffffff;
        }
        .price span {
            font-size: 16px;
            color: #6b7280;
            text-decoration: line-through;
            margin-left: 10px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input[type="email"] {
            width: 100%;
            padding: 12px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: border 0.3s;
        }
        input[type="email"]:focus {
            border-color: #2563eb;
        }
        button {
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="badge">Most Popular</div>
        <h1>Grow Your Business 10x with our <span>Ultimate Digital Toolkit</span></h1>
        <p class="subtitle">Get instant access to premium ready-to-use templates, assets, and guides. Save 100+ hours of manual work.</p>
        
        <div class="price-box">
            <div class="bundle-title">Complete Bundle (Zip File)</div>
            <div class="price">₹399 <span>₹1,999</span></div>
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="your@email.com" required>
        </div>

        <button id="buy-button">
            Buy Now & Download 🚀
        </button>
    </div>

    <script>
        // Stripe Key
        const stripe = Stripe('pk_test_51TogMFDVJgN6KRSRyPc5cMtjf6JMUK3eZXevHUreKDW6nYWhrxoL1yJy9h2dNWoBN0uuAyRFohVs2m4AufW4dZ2F001haMGeUo');
        
        const buyButton = document.getElementById('buy-button');

        buyButton.addEventListener('click', async () => {
            const emailInput = document.getElementById('email').value;
            
            if (!emailInput || !emailInput.includes('@')) {
                alert('Kripya ek sahi Email Address daalein!');
                return;
            }

            buyButton.disabled = true;
            buyButton.innerText = 'Processing... Please Wait...';

            try {
                // Sahi naya Render URL lagaya hai (-1 ke sath)
                const backend_url = "https://my-payment-website-1.onrender.com/create-checkout-session";
                
                const response = await fetch(backend_url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email: emailInput })
                });

                const session = await response.json();

                if (session.id) {
                    const result = await stripe.redirectToCheckout({
                        sessionId: session.id,
                    });
                    
                    if (result.error) {
                        alert(result.error.message);
                        buyButton.disabled = false;
                        buyButton.innerText = 'Buy Now & Download 🚀';
                    }
                } else {
                    alert('Backend se Session ID nahi mili. Kuch gadbad hai!');
                    buyButton.disabled = false;
                    buyButton.innerText = 'Buy Now & Download 🚀';
                }

            } catch (error) {
                console.error("Error:", error);
                alert("Backend se connect karne me dikkat aa rahi hai!");
                buyButton.disabled = false;
                buyButton.innerText = 'Buy Now & Download 🚀';
            }
        });
    </script>
</body>
</html>
