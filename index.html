<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Toolkit - Premium Bundle</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-gray-800 rounded-2xl shadow-xl overflow-hidden border border-gray-700">
        <div class="p-6 bg-gradient-to-r from-blue-600 to-indigo-600 text-center">
            <span class="bg-blue-500 bg-opacity-30 text-blue-200 text-xs font-bold uppercase tracking-widest px-3 py-1 rounded-full">Most Popular</span>
            <h1 class="text-2xl font-extrabold mt-2 tracking-tight">Grow Your Business 10x with our</h1>
            <p class="text-xl font-bold text-blue-100 mt-1">Ultimate Digital Toolkit</p>
        </div>

        <div class="p-6 space-y-6">
            <p class="text-gray-400 text-center text-sm">Get instant access to premium ready-to-use templates, assets, and guides. Save 100+ hours of manual work.</p>
            
            <div class="bg-gray-700 bg-opacity-50 rounded-xl p-4 text-center border border-gray-600">
                <p class="text-sm text-gray-400 font-medium">Complete Bundle (Zip File)</p>
                <div class="flex items-center justify-center gap-2 mt-1">
                    <span class="text-3xl font-black text-white">₹399</span>
                    <span class="text-sm text-gray-500 line-through">₹1,999</span>
                </div>
            </div>

            <form id="payment-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com" 
                        class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
                </div>

                <button type="submit" id="submit-btn"
                    class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold rounded-xl transition-colors shadow-lg shadow-blue-900/30 flex items-center justify-center">
                    <span id="btn-text">Get Instant Access Now</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('payment-form');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;

            // Button ko loading state me daalna
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');
            btnText.innerText = 'Processing... Please Wait...';

            try {
                // Render Backend URL (Yahan dhyan de ki last me /create-checkout-session sahi se laga hai)
                const response = await fetch('https://my-payment-website-1.onrender.com/create-checkout-session', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email: email }),
                });

                const data = await response.json();

                if (data.url) {
                    // Stripe payment page par bhejna
                    window.location.href = data.url;
                } else {
                    alert('Backend se Session ID nahi mili. Kuch gadbad hai!');
                    resetButton();
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Backend se connect nahi ho pa raha hai. Server checks karein.');
                resetButton();
            }
        });

        function resetButton() {
            submitBtn.disabled = false;
            submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
            btnText.innerText = 'Get Instant Access Now';
        }
    </script>
</body>
</html>
